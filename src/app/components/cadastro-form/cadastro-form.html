<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h2>{{ 'Adicionar Cadastro' }}</h2>
        </div>
        <div class="card-body">
          <form (ngSubmit)="saveCadastro()">
            <div class="form-group">
              <label for="titulo">Titulo</label>
              <input type="text" id="titulo" class="form-control" [(ngModel)]="cadastro.titulo" name="titulo" required>
            </div>
            <div class="form-group">
              <label for="descricao">Descrição</label>
              <input type="text" id="descricao" class="form-control" [(ngModel)]="cadastro.descricao" name="descricao" required>
            </div>
            <button type="submit" class="btn btn-primary">{{ 'Save' }}</button>
            <a routerLink="/cadastros" class="btn btn-secondary ml-2">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
